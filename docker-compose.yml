version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    # 只监听本机回环，不对公网裸暴露；公网访问统一走下面的 Caddy(443)
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/server/data/data.db
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - ./data:/app/server/data
      - ./backups:/app/server/backups
      - ./uploads:/app/server/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/dashboard',r=>process.exit(r.statusCode===401?0:1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # HTTPS 反向代理：自动申请/续期 Let's Encrypt 证书，公网入口
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
