version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - ./data:/app/server/data
      - ./backups:/app/server/backups
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/dashboard',r=>process.exit(r.statusCode===401?0:1))"]
      interval: 30s
      timeout: 10s
      retries: 3
